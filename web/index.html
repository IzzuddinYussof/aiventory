<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    Alternatively, build your application passing the --base-href parameter
    specifying the new root path of your web app.

    Fore more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="aiventory">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <meta name="robots" content="noindex" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="64x64" href="favicon.png" />

  <!-- Open Graph & SEO tags -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="aiventory" />
  <meta property="og:title" content="aiventory" />
  <meta property="og:description" content="Dentabay inventory and ordering app." />
  <meta property="og:url" content="https://aiventory.dentabay.com/" />
  <meta property="og:image" content="https://aiventory.dentabay.com/icons/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:title" content="aiventory" />
  <meta name="twitter:description" content="Dentabay inventory and ordering app." />
  <meta name="twitter:image" content="https://aiventory.dentabay.com/icons/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />

  <title>aiventory</title>
  <meta name="description" content="Dentabay inventory and ordering app." />
    

  <!-- Status Bar color in Safari browser (iOS) and PWA -->
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f1f4f8">
  <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#1d2428">

  <link rel="manifest" href="manifest.json">
  
</head>
<body>
  
  
  
  
  
  <script>
    {{flutter_bootstrap_js}}
  </script>
</body>
</html>
